kind = "web"
previewPath = "/"
title = "Finance App"
version = "1.0.0"
id = "artifacts/finance-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18748

[services.development]
run = "pnpm --filter @workspace/finance-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-app", "run", "build" ]
publicDir = "artifacts/finance-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18748"
BASE_PATH = "/"
